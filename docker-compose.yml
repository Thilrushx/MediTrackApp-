version: '3.9'

services:

  # ── MySQL Database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: meditrack-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-meditrack_root}
      MYSQL_DATABASE:      ${DB_NAME:-meditrack}
      MYSQL_USER:          ${DB_USER:-meditrack_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-meditrack_root}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_PASSWORD:-meditrack_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - meditrack-net

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meditrack-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:         ${PORT:-5000}
      DB_HOST:      db
      DB_PORT:      3306
      DB_NAME:      ${DB_NAME:-meditrack}
      DB_USER:      ${DB_USER:-meditrack_user}
      DB_PASSWORD:  ${DB_PASSWORD:-meditrack_root}
      DB_LOGGING:   ${DB_LOGGING:-false}
      JWT_SECRET:   ${JWT_SECRET:-meditrack_change_in_prod}
      JWT_EXPIRES:  ${JWT_EXPIRES:-8h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DOCTOR_REGISTER_CODE: ${DOCTOR_REGISTER_CODE:-MEDITRACK_DOCTOR_2026}
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded files outside the container
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - meditrack-net

  # ── Frontend (nginx) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Passed to Vite at build time — must point to the public backend URL
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: meditrack-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - meditrack-net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  meditrack-net:
    driver: bridge
